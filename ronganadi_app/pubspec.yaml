name: ronganadi_app
description: "Ronganadi Beta – Digital Survey & Citizen Engagement Platform"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.5.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # HTTP & API
  http: ^1.2.2
  
  # State Management
  provider: ^6.1.2
  
  # Local Storage
  shared_preferences: ^2.3.2
  
  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  
  # Excel Export
  excel: ^4.0.6
  
  # PDF Export  
  pdf: ^3.11.1
  printing: ^5.13.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
